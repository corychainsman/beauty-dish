<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Beauty Dish</title>
		<link rel="preload" href="fonts/Boston-Regular.woff2" as="font" type="font/woff2" crossorigin>
		<link rel="stylesheet" href="css/style.css">
</head>

<body>

<script src="js/chroma.min.js"></script>
<script src="js/interact.min.js"></script>

<div id="appVersionBadge" aria-label="App version"></div>
<div id="dish"></div>
<div id="picker">
	<h3>Video Conference Beauty Dish</h3>
	<div id="temperatureBrightnessGraph" class="temperatureBrightnessGraph">
		<div class="temperatureBrightnessGraphHeader">
			<p class="temperatureBrightnessGraphTitle">Temperature / brightness</p>
		</div>
		<div class="temperatureBrightnessGraphBody">
			<div class="temperatureBrightnessGraphPlot">
				<div class="temperatureBrightnessGraphStageWrap">
					<div class="temperatureBrightnessGraphYAxis">
						<span id="graphYMax">1.00x</span>
						<span id="graphYMid">0.64x</span>
						<span id="graphYMin">0.29x</span>
					</div>
					<div id="temperatureBrightnessGraphStage" class="temperatureBrightnessGraphStage">
						<canvas id="temperatureBrightnessGraphCanvas" aria-hidden="true"></canvas>
						<div id="temperatureBrightnessGraphHandle" class="temperatureBrightnessGraphHandle"></div>
						<div id="temperatureBrightnessGraphNotice" class="temperatureBrightnessGraphNotice hidden"></div>
					</div>
				</div>
				<div class="temperatureBrightnessGraphXAxis">
					<span>3000K</span>
					<span>8000K</span>
				</div>
			</div>
		</div>
	</div>
	<h5 id="brightnessStatus">
		<span id="brightnessStatusText">5500K @ 1.00x Brightness</span>
		<label for="hdrToggle" id="hdrToggleInline" class="hdrToggleInline hidden">
			<span> : HDR</span>
			<input type="checkbox" id="hdrToggle" checked>
		</label>
	</h5>
	<p><a id="toggleAdvanced" href="#">Advanced</a></p>
	<div id="advanced" class="hidden">
		<p>Write your own <a href="https://vis4.net/chromajs/" target="_blank">chroma.js</a> code to set the color</p>
		<textarea id="code" placeholder="chroma({ l:80, c:25, h:200 })" rows="3" cols="35">chroma({ l:80, c:25, h:200 })</textarea>
		<p>Preview: <span id="thumbnail"> </span><span id="code_output">#f5f5f5</span></p>
		<button type="submit" id="submit">Submit</button>
	</div>
</div>
<pre id="debugOverlay" class="hidden" aria-live="polite"></pre>
<button id="webcamPreview" onclick="void(0)">👀</button>
<div id="videoContainer" class="hidden">
	<button id="resizeWebcamPreview"></button>
	<video id="videoElement" autoplay playsinline></video>
</div>

<script type="module" src="js/index.js"></script>

</body>

</html>
